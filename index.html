<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firestore Static Web App</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="container">
    <h1>Firebase Firestore 정적 웹앱</h1>
    <p id="status">초기화 대기 중...</p>

    <section class="panel">
      <h2>평가자 테스트 데이터 추가</h2>
      <label class="field" for="nameInput">이름</label>
      <input id="nameInput" type="text" value="홍길동">

      <label class="field" for="employeeIdInput">사번</label>
      <input id="employeeIdInput" type="text" value="1234">

      <button id="addEvaluatorButton" type="button">evaluators에 테스트 데이터 1건 추가</button>
      <p id="resultMessage"></p>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
